<!--
  完整场景示例 A：数据场景（数据/数字）
  覆盖技法：panel + counter count-up + underline sweep + vignette breathing + anchor
  使用技法：#1 Counter Count-up + #3 Underline Scale + #7 Vignette Breathing
  改文字/颜色/数字即可复用。改 DURATION 和 timeline 中的时间点匹配你的口播时长。

  用法：复制 → 改 data-composition-id、文字内容、counter 目标值、DURATION
  颜色来源：DESIGN.md（本例用教程6的颜色：accent=#0066FF, accent-warm=#FFB300）
-->
<template id="s5-domains-template">
<div data-composition-id="s5-domains"
     data-start="0" data-duration="8.5"
     data-width="1920" data-height="1080">

  <!-- 背景层：深色渐变 + mask-image 右边缘羽化（SIDE 模式标配） -->
  <div class="panel">
    <div class="vignette"></div>

    <!-- 上方标签：小字描述 -->
    <div class="label" id="label">垂直领域覆盖</div>

    <!-- 核心数据：超大 counter -->
    <div class="counter-row">
      <span class="counter" id="counter">0</span>
      <span class="plus" id="plus">+</span>
    </div>

    <!-- 副标题/说明 -->
    <div class="subtitle" id="subtitle">股票 · CVE · 法律 · 学术论文</div>

    <!-- 底部装饰线 -->
    <div class="underline" id="underline"></div>
  </div>

</div>

<style>
/* CSS scope：必须用 [data-composition-id] 前缀防跨场景污染 */
[data-composition-id="s5-domains"] .panel {
  position: absolute; top: 0; left: 0;
  width: 960px; height: 1080px;
  background: linear-gradient(135deg, #07121c 0%, #0a1828 70%, #0d2031 100%);
  display: flex; flex-direction: column;
  align-items: flex-start; justify-content: center;
  gap: 28px; padding: 80px 100px;
  box-sizing: border-box; overflow: hidden;
  mask-image: linear-gradient(90deg, #000 0%, #000 88%, transparent 100%);
  -webkit-mask-image: linear-gradient(90deg, #000 0%, #000 88%, transparent 100%);
}

[data-composition-id="s5-domains"] .vignette {
  position: absolute; top: 0; left: 0;
  width: 960px; height: 1080px;
  background: radial-gradient(ellipse at 50% 50%, transparent 20%, rgba(0,0,0,0.4) 100%);
  opacity: 0.15; pointer-events: none;
}

[data-composition-id="s5-domains"] .label {
  font: 500 28px/1 "Noto Sans SC", sans-serif;
  color: #888; letter-spacing: 0.08em;
  opacity: 0; transform: translateX(-30px);
}

[data-composition-id="s5-domains"] .counter-row {
  display: flex; align-items: baseline; gap: 8px;
}

[data-composition-id="s5-domains"] .counter {
  font: 900 240px/0.9 "Space Grotesk", sans-serif;
  color: #0066FF;
  font-variant-numeric: tabular-nums;
  text-shadow: 0 0 60px rgba(0, 102, 255, 0.45);
  opacity: 0;
}

[data-composition-id="s5-domains"] .plus {
  font: 900 160px/1 "Space Grotesk", sans-serif;
  color: #FFB300;
  text-shadow: 0 0 50px rgba(255, 179, 0, 0.55);
  opacity: 0; transform: scale(0);
}

[data-composition-id="s5-domains"] .subtitle {
  font: 700 32px/1.3 "Noto Sans SC", sans-serif;
  color: #f5f5f5;
  opacity: 0; transform: translateY(20px);
}

[data-composition-id="s5-domains"] .underline {
  width: 280px; height: 4px;
  background: #0066FF;
  transform: scaleX(0); transform-origin: left center;
  box-shadow: 0 0 12px rgba(0, 102, 255, 0.4);
}
</style>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<script>
(() => {
  window.__timelines = window.__timelines || {};
  const DURATION = 8.5;
  const S = '[data-composition-id="s5-domains"] ';
  const tl = gsap.timeline({ paused: true });

  // ── Build 阶段（0-30%）：元素 stagger 入场 ──
  tl.to(S + '.label',
    { opacity: 1, x: 0, duration: 0.35, ease: 'power3.out' }, 0.2);

  tl.to(S + '.counter',
    { opacity: 1, duration: 0.2, ease: 'power2.out' }, 0.3);

  // counter count-up（核心技法）
  const counterObj = { val: 0 };
  const counterEl = document.querySelector(S + '.counter');
  tl.to(counterObj, {
    val: 23,
    duration: 0.65, ease: 'power2.out',
    snap: { val: 1 },
    onUpdate() { if (counterEl) counterEl.textContent = Math.round(counterObj.val); }
  }, 0.35);

  tl.to(S + '.plus',
    { opacity: 1, scale: 1, duration: 0.26, ease: 'back.out(3)' }, 1.05);

  tl.to(S + '.subtitle',
    { opacity: 1, y: 0, duration: 0.4, ease: 'power2.out' }, 1.2);

  tl.to(S + '.underline',
    { scaleX: 1, duration: 0.32, ease: 'power2.out' }, 1.6);

  // ── Breathe 阶段（30%-100%）：ambient 保持活跃 ──
  const vc = Math.ceil(DURATION / 4) - 1;
  tl.to(S + '.vignette',
    { opacity: '+=0.08', duration: 2, repeat: vc, yoyo: true, ease: 'sine.inOut' }, 2.5);

  const tc = Math.ceil(DURATION / 6) - 1;
  tl.to(S + '.counter',
    { scale: '+=0.015', duration: 3, repeat: tc, yoyo: true, ease: 'sine.inOut' }, 3.0);

  // ── Anchor：确保 tl.duration() 匹配 DURATION ──
  tl.to({}, { duration: DURATION }, 0);

  window.__timelines['s5-domains'] = tl;
})();
</script>
</template>
