<!--
  印章徽章+横幅场景模板 — 改文字/颜色/DURATION 即用
  内容类型：价格/费用、"值得付费"、商业价值强调
  使用技法：#13 Stamp Badge + Backdrop-filter + #12 Text-stroke Outline
  Face 模式：HERO（全屏人脸，stamp 在左上角，banner 在底部）
  来源：may-shorts-6/scene7-pay-for
-->
<template id="example-stamp-template">
<div data-composition-id="example-stamp" data-start="0"
     data-duration="1.6" data-width="1920" data-height="1080">
  <!-- HERO mode: face full-screen behind. Stamp badge upper-left + banner at bottom -->

  <!-- 印章徽章 — 左上角 -->
  <div class="stamp" id="stamp">
    <span class="stamp-amount">$$$</span>
    <span class="stamp-label">PAID</span>
  </div>

  <!-- 底部横幅 — 居中条 -->
  <div class="banner" id="banner">
    <div class="banner-bar" id="banner-bar"></div>
    <div class="banner-text">WHAT BUSINESSES PAY FOR</div>
  </div>

<style>
[data-composition-id="example-stamp"] { position: absolute; inset: 0; }
[data-composition-id="example-stamp"] .stamp {
  position: absolute; top: 80px; left: 90px;
  padding: 30px 56px;
  border: 6px solid #f09025; border-radius: 22px;
  background: rgba(7, 18, 28, 0.78);
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  display: flex; flex-direction: column; align-items: center; gap: 8px;
  font-family: "Montserrat", sans-serif; line-height: 1;
  opacity: 0; transform: rotate(-6deg) scale(0.8);
  transform-origin: center center;
  box-shadow: 0 0 60px rgba(240, 144, 37, 0.45),
              inset 0 0 30px rgba(240, 144, 37, 0.12);
}
[data-composition-id="example-stamp"] .stamp-amount {
  font-weight: 900; font-size: 140px; color: #f09025;
  letter-spacing: -0.04em;
  text-shadow: 0 0 32px rgba(240, 144, 37, 0.65);
}
[data-composition-id="example-stamp"] .stamp-label {
  font-family: "Roboto Mono", monospace;
  font-weight: 700; font-size: 46px; letter-spacing: 0.18em;
  color: #fff;
}
[data-composition-id="example-stamp"] .banner {
  position: absolute; bottom: 230px; left: 0; width: 100%; height: 88px;
  display: flex; align-items: center; justify-content: center;
  opacity: 0;
}
[data-composition-id="example-stamp"] .banner-bar {
  position: absolute; left: 50%; top: 50%;
  height: 88px; width: 940px;
  margin-left: -470px; margin-top: -44px;
  background: linear-gradient(90deg, transparent 0%, rgba(7,18,28,0.92) 12%, rgba(7,18,28,0.92) 88%, transparent 100%);
  border-top: 2px solid rgba(240, 144, 37, 0.55);
  border-bottom: 2px solid rgba(240, 144, 37, 0.55);
  transform: scaleX(0); transform-origin: center center;
}
[data-composition-id="example-stamp"] .banner-text {
  position: relative;
  font-family: "Roboto Mono", monospace;
  font-weight: 700; font-size: 44px; letter-spacing: 0.22em;
  color: #fff;
  text-shadow: 0 0 24px rgba(240, 144, 37, 0.6);
  z-index: 1; opacity: 0;
}
</style>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<script>
(() => {
  window.__timelines = window.__timelines || {};
  const DURATION = 1.6;
  const SCOPE = '[data-composition-id="example-stamp"] ';
  const tl = gsap.timeline({ paused: true });

  // BUILD（入场）
  // Stamp badge — 旋转弹入
  tl.to(SCOPE + "#stamp", {
    opacity: 1, scale: 1, rotate: -6,
    duration: 0.34, ease: "back.out(2.6)"
  }, 0.05);
  // Banner — 整体显示 + bar 横向展开
  tl.to(SCOPE + "#banner", { opacity: 1, duration: 0.28, ease: "power2.out" }, 0.35);
  tl.to(SCOPE + "#banner-bar", { scaleX: 1, duration: 0.42, ease: "power3.out" }, 0.35);
  // Banner text — bar 展开后文字显示
  tl.to(SCOPE + ".banner-text", { opacity: 1, duration: 0.28, ease: "power2.out" }, 0.6);

  // Anchor
  tl.set({}, {}, DURATION);
  window.__timelines["example-stamp"] = tl;
})();
</script>
</div>
</template>
