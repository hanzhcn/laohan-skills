<!--
  完整场景示例 B：列表场景（列举/枚举）
  覆盖技法：panel + stagger list + strike-through（否定项） + mask-image + vignette breathing + anchor
  改文字/行数/颜色即可复用。

  用法：复制 → 改 data-composition-id、列表行数和文字、DURATION
  颜色来源：DESIGN.md（accent=#0066FF, accent-warm=#FFB300）
-->
<template id="s3-data-template">
<div data-composition-id="s3-data"
     data-start="0" data-duration="7.5"
     data-width="1920" data-height="1080">

  <div class="panel">
    <div class="vignette"></div>

    <!-- 标题 -->
    <div class="title" id="title">核心好处</div>

    <!-- 列表行：每行 = 文字 + 可选 strike -->
    <div class="row" id="row1">
      <span class="text">给你一堆网页自己翻</span>
      <span class="strike" id="strike1"></span>
    </div>
    <div class="row" id="row2">
      <span class="text">需要自己解析格式</span>
      <span class="strike" id="strike2"></span>
    </div>
    <div class="row good" id="row3">
      <span class="text">数据结构化</span>
    </div>

    <!-- 底部标签 -->
    <div class="tag" id="tag">热榜就是热榜 · 视频信息就是视频信息</div>
  </div>

</div>

<style>
[data-composition-id="s3-data"] .panel {
  position: absolute; top: 0; left: 0;
  width: 960px; height: 1080px;
  background: linear-gradient(135deg, #07121c 0%, #0a1828 70%, #0d2031 100%);
  display: flex; flex-direction: column;
  align-items: flex-start; justify-content: center;
  gap: 32px; padding: 80px 100px;
  box-sizing: border-box; overflow: hidden;
  mask-image: linear-gradient(90deg, #000 0%, #000 88%, transparent 100%);
  -webkit-mask-image: linear-gradient(90deg, #000 0%, #000 88%, transparent 100%);
}

[data-composition-id="s3-data"] .vignette {
  position: absolute; top: 0; left: 0;
  width: 960px; height: 1080px;
  background: radial-gradient(ellipse at 50% 50%, transparent 20%, rgba(0,0,0,0.4) 100%);
  opacity: 0.15; pointer-events: none;
}

[data-composition-id="s3-data"] .title {
  font: 900 56px/1 "Noto Sans SC", sans-serif;
  color: #f5f5f5;
  opacity: 0; transform: translateX(-40px);
}

[data-composition-id="s3-data"] .row {
  position: relative;
  font: 900 72px/1 "Noto Sans SC", sans-serif;
  color: rgba(255, 255, 255, 0.5);
  opacity: 0; transform: translateX(-30px);
}

[data-composition-id="s3-data"] .row.good {
  color: #0066FF;
  text-shadow: 0 0 30px rgba(0, 102, 255, 0.5);
  opacity: 0; transform: translateX(-30px);
}

[data-composition-id="s3-data"] .strike {
  position: absolute; left: -10px; top: 50%;
  height: 7px; width: calc(100% + 20px);
  background: #FFB300;
  transform-origin: left center; transform: scaleX(0);
  box-shadow: 0 0 18px rgba(255, 179, 0, 0.6);
}

[data-composition-id="s3-data"] .tag {
  font: 500 24px/1.3 "Noto Sans SC", sans-serif;
  color: #888; opacity: 0;
}
</style>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<script>
(() => {
  window.__timelines = window.__timelines || {};
  const DURATION = 7.5;
  const S = '[data-composition-id="s3-data"] ';
  const tl = gsap.timeline({ paused: true });

  // ── Build ──
  tl.to(S + '.title',
    { opacity: 1, x: 0, duration: 0.4, ease: 'power3.out' }, 0.15);

  // 列表行 stagger 入场 + 否定项打叉
  const GAP = 0.45;
  const rows = [
    { row: '#row1', strike: '#strike1', t: 0.6 },
    { row: '#row2', strike: '#strike2', t: 0.6 + GAP },
    { row: '#row3', strike: null,       t: 0.6 + GAP * 2 },
  ];

  rows.forEach(({ row, strike, t }) => {
    tl.to(S + row,
      { opacity: 1, x: 0, duration: 0.34, ease: 'power3.out' }, t);
    if (strike) {
      tl.to(S + strike,
        { scaleX: 1, duration: 0.32, ease: 'power2.out' }, t + 0.4);
    }
  });

  tl.to(S + '.tag',
    { opacity: 1, duration: 0.3, ease: 'power2.out' }, 2.4);

  // ── Breathe ──
  const vc = Math.ceil(DURATION / 4) - 1;
  tl.to(S + '.vignette',
    { opacity: '+=0.08', duration: 2, repeat: vc, yoyo: true, ease: 'sine.inOut' }, 3.0);

  const gc = Math.ceil(DURATION / 6) - 1;
  tl.to(S + '.row.good',
    { scale: '+=0.015', duration: 3, repeat: gc, yoyo: true, ease: 'sine.inOut' }, 3.5);

  // ── Anchor ──
  tl.to({}, { duration: DURATION }, 0);

  window.__timelines['s3-data'] = tl;
})();
</script>
</template>
