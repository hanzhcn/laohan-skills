<!--
  肯定列表场景模板 — 改文字/颜色/DURATION 即用
  内容类型：正面列举、"你需要这些"、"核心功能"、优势列表
  使用技法：#10 Check-list Stagger + Dual-accent + #6 Mask-image Feather + #7 Vignette Breathing
  Face 模式：SIDE（左右分屏）
  来源：may-shorts-6/scene4-want-list
-->
<template id="example-affirm-template">
<div data-composition-id="example-affirm" data-start="0"
     data-duration="2.6" data-width="1920" data-height="1080">
  <div class="panel">
    <div class="label">你需要：</div>
    <div class="row" id="row1">
      <span class="check">✓</span>
      <span class="text">省时间</span>
    </div>
    <div class="row" id="row2">
      <span class="check check-warn">✓</span>
      <span class="text text-warn">能赚钱</span>
    </div>
    <div class="row" id="row3">
      <span class="check">✓</span>
      <span class="text">易上手</span>
    </div>
  </div>
  <div class="vignette"></div>

<style>
[data-composition-id="example-affirm"] { position: absolute; inset: 0; }
[data-composition-id="example-affirm"] .panel {
  position: absolute; top: 0; left: 0;
  width: 960px; height: 1080px;
  background: linear-gradient(135deg, #07121c 0%, #0a1828 70%, #0d2031 100%);
  display: flex; flex-direction: column;
  align-items: flex-start; justify-content: center;
  gap: 36px; padding: 80px 100px;
  box-sizing: border-box; overflow: hidden;
  mask-image: linear-gradient(90deg, #000 0%, #000 88%, transparent 100%);
  -webkit-mask-image: linear-gradient(90deg, #000 0%, #000 88%, transparent 100%);
}
[data-composition-id="example-affirm"] .label {
  font-family: "Roboto Mono", monospace;
  font-weight: 500; font-size: 44px; letter-spacing: 0.18em;
  color: #37bdf8; opacity: 0;
}
[data-composition-id="example-affirm"] .row {
  display: flex; align-items: center; gap: 28px;
  font-weight: 900; font-size: 96px; line-height: 1.0;
  letter-spacing: -0.02em; color: #fff;
  opacity: 0; transform: translateX(-30px);
}
[data-composition-id="example-affirm"] .check {
  color: #37bdf8; font-size: 96px;
  text-shadow: 0 0 28px rgba(55,189,248,0.65);
}
[data-composition-id="example-affirm"] .check-warn {
  color: #f09025;
  text-shadow: 0 0 28px rgba(240,144,37,0.65);
}
[data-composition-id="example-affirm"] .text-warn {
  color: #f09025;
  text-shadow: 0 0 32px rgba(240,144,37,0.45);
}
[data-composition-id="example-affirm"] .vignette {
  position: absolute; top: 0; left: 0; width: 960px; height: 1080px;
  pointer-events: none;
  background: radial-gradient(ellipse at 50% 50%, transparent 30%, rgba(0,0,0,0.5) 100%);
  opacity: 0.2;
}
</style>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<script>
(() => {
  const DURATION = 2.6;
  const SCOPE = '[data-composition-id="example-affirm"] ';
  const tl = gsap.timeline({ paused: true });

  // BUILD（入场）
  tl.to(SCOPE + ".label", { opacity: 1, duration: 0.28, ease: "power2.out" }, 0.05);
  tl.to(SCOPE + "#row1", { opacity: 1, x: 0, duration: 0.36, ease: "back.out(1.6)" }, 0.32);
  tl.to(SCOPE + "#row2", { opacity: 1, x: 0, duration: 0.36, ease: "back.out(1.6)" }, 0.9);
  tl.to(SCOPE + "#row3", { opacity: 1, x: 0, duration: 0.36, ease: "back.out(1.6)" }, 1.5);

  // BREATHE（ambient）
  const cycles = Math.ceil(DURATION / 4) - 1;
  tl.to(SCOPE + ".vignette", { opacity: "+=0.08", duration: 2,
    repeat: cycles, yoyo: true, ease: "sine.inOut" }, 2.0);

  // Anchor
  tl.set({}, {}, DURATION);
  window.__timelines["example-affirm"] = tl;
})();
</script>
</div>
</template>
